<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        .main-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #333;
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin: 5px;
        }
        .also-btn {
            background-color: #2ed573;
            display: none;
        }
        #secret-message, #minecraft-text {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #555;
            line-height: 1.5;
        }
        #minecraft-text {
            border-top: none;
            margin-top: 10px;
            font-weight: bold;
            color: #2f3542;
        }
    </style>
</head>
<body>

    <div class="box">
        <p class="main-text">
so i can do this with coding
        </p>
        
        <button id="first-btn" onclick="showText()">Click to find out</button>
        <button id="also-btn" class="also-btn" onclick="showMinecraft()">Also...</button>

        <p id="secret-message">
            also i added buttons look clikc the other one 
            </p>

        <p id="minecraft-text">
see all the buttons work 
        </p> 
    </div>

    <script>
        function showText() {
            document.getElementById('secret-message').style.display = 'block';
            document.getElementById('first-btn').style.display = 'none';
            document.getElementById('also-btn').style.display = 'inline-block';
        }

        function showMinecraft() {
            document.getElementById('minecraft-text').style.display = 'block';
            document.getElementById('also-btn').style.display = 'none';
        }
    </script>

</body>
</html>
